homes:
  max-homes:
    default: 2
    plus: 5

  plus-permission: mineacle.plus

  allowed-worlds:
    enabled: true
    worlds:
      - origins
      - world_nether
      - world_the_end

  blocked-worlds:
    - example_blocked_world

  teleport:
    delay-seconds: 5
    cancel-on-move: true

  delete-confirm:
    timeout-seconds: 5

  team-home:
    enabled: true
    banner-slot: 10
    dye-slot: 19
    teleport-delay-seconds: 5
    delete-confirm-timeout-seconds: 5

    allowed-worlds:
      enabled: true
      worlds:
        - origins
        - world_nether
        - world_the_end

    blocked-worlds:
      - example_blocked_world

teams:
  enabled: true
  max-members: 45